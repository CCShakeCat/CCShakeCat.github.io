<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stopwatch</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="../globals/styles.css">
</head>
<body class="theme-dark">
  <button id="settingsBtn" title="Settings" class="icon-btn" aria-label="Settings">
    <img src="../globals/icons/gear.png" alt="Settings" class="icon"/>
  </button>

  <div class="stopwatch-app">
    <div class="clock-row">
      <div id="prefixWrap">
        <div id="prefixText" data-no-bitmap>TIME</div>
        <img id="prefixIcon" src="icons/stopwatch_23f1-fe0f.png" alt="" />
      </div>
      <p id="display" aria-live="polite">00:00:00.00</p>
    </div>

    <div class="buttons">
      <button id="startStopBtn">Start</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <div id="settingsModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div id="modalCard" class="modal-content">
      <button id="closeSettings" title="Close" class="icon-btn close-btn" aria-label="Close">
        <img src="../globals/icons/close.png" alt="Close" class="icon"/>
      </button>

      <section id="page-main" class="modal-page active">
        <h2 class="lbl">OPTIONS</h2>

        <div class="settings-stack">
          <label class="lbl" for="fontSelect">Font</label>
          <div class="setting-row">
            <select id="fontSelect" class="grow">
              <option value="default">Default</option>
              <option value="system">System</option>
              <option value="custom">Custom</option>
              <option value="bitmap">Bitmap</option>
            </select>

            <button id="importCustomFont" type="button">Import Custom Font...</button>
            <input type="file" id="customFontFile" class="hidden" accept=".ttf,.otf,.woff,.woff2"/>
            <span id="customFontName" class="custom-font-name"></span>
          </div>
          <div id="customFontNotice">If the font doesn't apply right away, try refreshing the page</div>

          <div class="size-title lbl">Size</div>
          <div class="setting-row size-row">
            <button id="sizePrev" class="chip" type="button">&lt;</button>
            <span id="sizeLabel" class="size-label">3</span>
            <button id="sizeNext" class="chip" type="button">&gt;</button>
          </div>

          <button id="openStyle" class="chip grow" type="button">Customize Style &gt;</button>
          <button id="openColors" class="chip grow" type="button">Colour Customization &gt;</button>
          <button id="openKeybinds" class="chip grow" type="button">KEYBINDS</button>
          <a class="global-settings-btn" href="../globals/global_settings.html" data-global-settings-link>Global Settings</a>
        </div>
      </section>

      <section id="page-style" class="modal-page">
        <button id="backFromStyle" class="modal-back-btn" type="button">&lt; Back</button>
        <h2 class="lbl">Clock Customization</h2>

        <div class="settings-stack">
          <div class="show-clock">
            <div class="show-clock-title">Show on Clock:</div>

            <label class="show-clock-auto">
              <input type="checkbox" id="showAuto">
              <span>Auto - hide what is zero</span>
            </label>

            <div class="show-clock-row">
              <label class="show-clock-item"><input type="checkbox" id="showHours" checked><span>HH</span></label>
              <span class="show-clock-sep">:</span>
              <label class="show-clock-item"><input type="checkbox" id="showMinutes" checked><span>MM</span></label>
              <span class="show-clock-sep">:</span>
              <label class="show-clock-item"><input type="checkbox" id="showSeconds" checked><span>SS</span></label>
              <span class="show-clock-sep">.</span>
              <label class="show-clock-item"><input type="checkbox" id="showTicks" checked><span>TT</span></label>
            </div>
          </div>

          <div class="setting-row">
            <label class="lbl" for="tpsSelect">Tick Rate:</label>
            <select id="tpsSelect" aria-label="Tick Rate">
              <option value="10">10</option>
              <option value="20">20</option>
              <option value="30">30</option>
              <option value="40" selected>40 (Default)</option>
              <option value="50">50</option>
              <option value="60">60</option>
              <option value="70">70</option>
              <option value="80">80</option>
              <option value="90">90</option>
              <option value="100">100</option>
              <option value="custom">Custom...</option>
            </select>
            <span>TPS</span>
            <input type="number" id="tpsCustom" class="hidden" min="10" max="100" step="1" placeholder="10-100" aria-label="Custom TPS"/>
          </div>

          <div class="setting-row">
            <label class="lbl" for="prefixSelect">Prefix:</label>
            <select id="prefixSelect">
              <option value="default">Default</option>
              <option value="time">Text</option>
              <option value="icon">Icon</option>
            </select>
          </div>

          <button id="openSpeedrunner" class="chip grow" type="button">Speedrunner Mode &gt;</button>
        </div>
      </section>

      <section id="page-colors" class="modal-page">
        <button id="backFromColors" class="modal-back-btn" type="button">&lt; Back</button>
        <h2 class="lbl">Colour Customization</h2>

        <div class="settings-stack colour-settings" data-no-ui-sound data-no-drag>
          <input type="hidden" id="colourTarget" value="normal">

          <div class="colour-mode-row">
            <button type="button" id="colourModeRGB" class="colour-mode-btn active">RGB</button>
            <button type="button" id="colourModeHSV" class="colour-mode-btn">HSV</button>
          </div>

          <div class="setting-row color-field">
            <label class="lbl" for="colourValue">HEX / CSS</label>
            <div class="color-input-row">
              <input type="text" id="colourValue" placeholder="#FFFFFF or rgb(255,255,255)">
              <button type="button" id="colourPreview" class="color-preview-btn" aria-label="Colour preview"></button>
            </div>
          </div>

          <div id="rgbEditor" class="colour-editor active">
            <div class="channel-row">
              <div class="channel-label">R</div>
              <input type="range" id="rgbRRange" min="0" max="255" step="1">
              <input type="number" id="rgbRInput" class="channel-number" min="0" max="255" step="1">
            </div>
            <div class="channel-row">
              <div class="channel-label">G</div>
              <input type="range" id="rgbGRange" min="0" max="255" step="1">
              <input type="number" id="rgbGInput" class="channel-number" min="0" max="255" step="1">
            </div>
            <div class="channel-row">
              <div class="channel-label">B</div>
              <input type="range" id="rgbBRange" min="0" max="255" step="1">
              <input type="number" id="rgbBInput" class="channel-number" min="0" max="255" step="1">
            </div>
          </div>

          <div id="hsvEditor" class="colour-editor">
            <div class="channel-row">
              <div class="channel-label">H</div>
              <input type="range" id="hsvHRange" min="0" max="360" step="1">
              <input type="number" id="hsvHInput" class="channel-number" min="0" max="360" step="1">
            </div>
            <div class="channel-row">
              <div class="channel-label">S</div>
              <input type="range" id="hsvSRange" min="0" max="100" step="1">
              <input type="number" id="hsvSInput" class="channel-number" min="0" max="100" step="1">
            </div>
            <div class="channel-row">
              <div class="channel-label">V</div>
              <input type="range" id="hsvVRange" min="0" max="100" step="1">
              <input type="number" id="hsvVInput" class="channel-number" min="0" max="100" step="1">
            </div>
          </div>

          <button id="resetColours" class="chip grow" type="button">Reset to Default</button>
        </div>
      </section>

      <section id="page-speedrunner" class="modal-page">
        <button id="backFromSpeedrunner" class="modal-back-btn" type="button">&lt; Back</button>
        <h2 class="lbl">Speedrunner Mode</h2>

        <div class="settings-stack">
          <label class="show-clock-auto speedrunner-inline">
            <input type="checkbox" id="speedrunnerMode"> Enabled
          </label>

          <button id="clearPersonalBest" class="chip grow" type="button">Clear PB</button>
          <button id="openSpeedrunnerColours" class="chip grow" type="button">Colours &gt;</button>
        </div>
      </section>

      <section id="page-speedrunner-colors" class="modal-page">
        <button id="backFromSpeedrunnerColours" class="modal-back-btn" type="button">&lt; Back</button>
        <h2 class="lbl">Speedrunner Colours</h2>

        <div class="settings-stack colour-settings" data-no-ui-sound data-no-drag>
          <div class="speed-colour-list">
            <div class="speed-colour-row active" data-speed-row="zero">
              <label for="speedColourZero">Zero</label>
              <input type="text" id="speedColourZero" data-speed-colour="zero" placeholder="#RRGGBB or rgb(255, 255, 255)">
              <button type="button" class="color-preview-btn speed-colour-preview" data-speed-preview="zero" aria-label="Edit Zero colour"></button>
            </div>
            <div class="speed-colour-row" data-speed-row="paused">
              <label for="speedColourPaused">Paused</label>
              <input type="text" id="speedColourPaused" data-speed-colour="paused" placeholder="#RRGGBB or rgb(255, 255, 255)">
              <button type="button" class="color-preview-btn speed-colour-preview" data-speed-preview="paused" aria-label="Edit Paused colour"></button>
            </div>
            <div class="speed-colour-row" data-speed-row="running">
              <label for="speedColourRunning">Running</label>
              <input type="text" id="speedColourRunning" data-speed-colour="running" placeholder="#RRGGBB or rgb(255, 255, 255)">
              <button type="button" class="color-preview-btn speed-colour-preview" data-speed-preview="running" aria-label="Edit Running colour"></button>
            </div>
            <div class="speed-colour-row" data-speed-row="pb">
              <label for="speedColourPB">Personal Best</label>
              <input type="text" id="speedColourPB" data-speed-colour="pb" placeholder="#RRGGBB or rgb(255, 255, 255)">
              <button type="button" class="color-preview-btn speed-colour-preview" data-speed-preview="pb" aria-label="Edit Personal Best colour"></button>
            </div>
          </div>

          <div class="colour-mode-row">
            <button type="button" id="speedColourModeRGB" class="colour-mode-btn active">RGB</button>
            <button type="button" id="speedColourModeHSV" class="colour-mode-btn">HSV</button>
          </div>

          <div id="speedRgbEditor" class="colour-editor active">
            <div class="channel-row">
              <div class="channel-label">R</div>
              <input type="range" id="speedRgbRRange" min="0" max="255" step="1">
              <input type="number" id="speedRgbRInput" class="channel-number" min="0" max="255" step="1">
            </div>
            <div class="channel-row">
              <div class="channel-label">G</div>
              <input type="range" id="speedRgbGRange" min="0" max="255" step="1">
              <input type="number" id="speedRgbGInput" class="channel-number" min="0" max="255" step="1">
            </div>
            <div class="channel-row">
              <div class="channel-label">B</div>
              <input type="range" id="speedRgbBRange" min="0" max="255" step="1">
              <input type="number" id="speedRgbBInput" class="channel-number" min="0" max="255" step="1">
            </div>
          </div>

          <div id="speedHsvEditor" class="colour-editor">
            <div class="channel-row">
              <div class="channel-label">H</div>
              <input type="range" id="speedHsvHRange" min="0" max="360" step="1">
              <input type="number" id="speedHsvHInput" class="channel-number" min="0" max="360" step="1">
            </div>
            <div class="channel-row">
              <div class="channel-label">S</div>
              <input type="range" id="speedHsvSRange" min="0" max="100" step="1">
              <input type="number" id="speedHsvSInput" class="channel-number" min="0" max="100" step="1">
            </div>
            <div class="channel-row">
              <div class="channel-label">V</div>
              <input type="range" id="speedHsvVRange" min="0" max="100" step="1">
              <input type="number" id="speedHsvVInput" class="channel-number" min="0" max="100" step="1">
            </div>
          </div>

          <button id="resetSpeedColours" class="chip grow" type="button">Reset to Default</button>
        </div>
      </section>
    </div>
  </div>

  <div id="keybindsModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-content keybinds-gray">
      <button id="closeKeybinds" title="Close" class="icon-btn close-btn" aria-label="Close">
        <img src="../globals/icons/close.png" alt="" class="icon"/>
      </button>

      <div class="settings-header">
        <span class="font-header-text">KEYBINDS</span>
      </div>

      <div class="kb-rows">
        <div class="kb-row">
          <span class="kb-label">START/STOP</span>
          <button id="rebindStartStop" class="kb-bind-btn" type="button">
            <span class="kb-bind-text" id="bindStartStopLabel">Return</span>
          </button>
        </div>

        <div class="kb-row">
          <span class="kb-label">RESET</span>
          <button id="rebindReset" class="kb-bind-btn" type="button">
            <span class="kb-bind-text" id="bindResetLabel">Shift+Delete</span>
          </button>
        </div>

        <div class="kb-row">
          <span class="kb-label">CLEAR PERSONAL BEST</span>
          <button id="rebindClearPb" class="kb-bind-btn" type="button">
            <span class="kb-bind-text" id="bindClearPbLabel">Delete</span>
          </button>
        </div>
      </div>

      <div class="kb-footer">
        <button id="kbResetDefaults" class="setting-input danger" type="button">
          Reset to default bindings
        </button>
        <span id="kbCountdown" class="kb-countdown" aria-live="polite"></span>
      </div>
    </div>
  </div>

  <script src="../globals/themes/theme_runtime.js"></script>
  <script src="../globals/global.js"></script>
  <script src="../globals/modal.js"></script>
  <script src="script.js"></script>
</body>
</html>
