<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Timer - Standard</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="../../globals/styles.css">
</head>
<body class="theme-dark">
  <div id="emergencyFlashOverlay" class="emergency-flash-overlay" aria-hidden="true"></div>

  <!-- Settings (gear) -->
  <button id="settingsBtn" class="icon-btn" aria-label="Settings">
    <img class="icon" src="../../globals/icons/gear.png" alt="" />
  </button>

  <!-- Timer UI -->
  <div class="timer-app">
    <div class="clock-row">
      <div id="prefixWrap">
        <div id="prefixText" data-no-bitmap>TIME</div>
        <img id="prefixIcon" src="./icons/clock.png" alt="" />
      </div>
      <div id="timerDisplay" aria-live="polite" data-no-bitmap>00:09:59.39</div>
    </div>

    <!-- Editable overlay -->
    <input id="timerInput" type="text" autocomplete="off" spellcheck="false" aria-label="Set timer (HH:MM:SS.TT)" />

    <div class="buttons">
      <button id="startPauseBtn">Start</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <!-- Modal -->
  <div id="settingsModal" class="modal" aria-hidden="true">
    <div id="modalCard" class="modal-content">
      <button id="closeSettings" class="close-btn" aria-label="Close">
        <img class="icon" src="../../globals/icons/close.png" alt="Close">
      </button>

      <!-- MAIN PAGE -->
      <section id="page-main" class="modal-page active">
        <h2 class="lbl" style="text-align:center;margin:0 0 6px;">OPTIONS</h2>

        <div class="stack">
          <label class="lbl" for="fontSelect" style="text-align:center;">Font:</label>
          <div class="row center">
            <select id="fontSelect" class="grow">
              <option value="default">Default</option>
              <option value="system">System</option>
              <option value="custom">Custom</option>
              <option value="bitmap">Bitmap</option>
            </select>

            <label id="importCustomFont" class="chip" for="customFontFile" role="button" tabindex="0" style="cursor:pointer;">
              Import Custom Font...
            </label>
            <input id="customFontFile" type="file" accept=".ttf,.otf,.woff,.woff2" style="display:none;" />
          </div>

          <div id="customFontNotice" class="tiny muted" style="display:none;text-align:center;">
            <span id="customFontName">Loaded: -</span><br>
            If the font doesn't change immediately, try refreshing.
          </div>

          <div class="row center size-row" style="margin-top:6px;">
            <span class="lbl">Size</span>
          </div>
          <div class="row center size-row">
            <button id="sizePrev" class="chip">&lt;</button>
            <span id="sizeLabel" class="size-label">3</span>
            <button id="sizeNext" class="chip">&gt;</button>
          </div>

          <div class="row center" style="margin-top:8px;">
            <button id="openStyle" class="chip grow">Customize Style ></button>
          </div>

          <div class="row center" style="margin-top:6px;">
            <button id="openColours" class="chip grow">Colour Customization ></button>
          </div>

          <!-- Music URL + status -->
          <div class="row center" style="margin-top:6px;">
            <input id="musicUrlInput" class="grow" type="text" placeholder="Paste YouTube, or direct audio URL..." />
            <button id="musicUrlSubmitBtn" class="chip">Submit</button>
            <button id="musicUploadBtn" class="chip" type="button">Upload</button>
            <button id="musicPauseBtn" class="chip" type="button" aria-pressed="false">Pause Music</button>
            <input id="musicUploadFile" type="file" accept="audio/*,.mp3,.ogg,.wav,.m4a,.aac,.flac" hidden />

            <div class="status-wrapper">
              <button id="musicStatusBtn" class="status-btn" aria-label="Music status">
                <img id="musicStatusIcon" src="./icons/question.png" alt="" />
              </button>
              <div id="musicStatusTip" class="status-tip">No music</div>
            </div>
          </div>

          <div class="row center music-volume-row" style="margin-top:6px;">
            <label class="lbl" for="musicVolume">Music Volume</label>
            <input id="musicVolume" class="grow" type="range" min="0" max="100" value="100" />
            <span id="musicVolumeLabel" class="lbl">100%</span>
          </div>

          <!-- Mini players INSIDE the modal -->
          <div class="music-players" style="margin-top:6px;">
            <audio id="bgAudio" controls style="display:none; width:100%;"></audio>
            <div id="ytWrap" style="display:none; width:100%; margin-top:6px; border-radius:10px; overflow:hidden;">
              <!-- Centered mini player -->
              <div id="ytPlayer" style="width:50%; aspect-ratio:16 / 9; margin:0 auto;"></div>
            </div>
          </div>

          <div class="row center" style="margin-top:6px;">
            <button id="openHurry" class="chip grow">Customize Hurry-Up ></button>
          </div>
          <a class="global-settings-btn" href="../../globals/global_settings.html" data-global-settings-link>Global Settings</a>
        </div>
      </section>

      <!-- COLOUR PAGE -->
      <section id="page-colours" class="modal-page">
        <button id="backFromColours" class="modal-back-btn">&lt; Back</button>
        <h2 class="lbl" style="text-align:center;margin:0 0 6px;">Colour Customization</h2>

        <div class="stack colour-stack" data-no-ui-sound data-no-drag>
          <label class="colour-row active" data-timer-colour-row="prefix">
            <span class="lbl">Prefix text colour</span>
            <input id="prefixColorInput" type="text" value="#FFFF00" aria-label="Prefix text colour">
            <button id="prefixColorPicker" class="color-preview-btn" type="button" aria-label="Edit prefix text colour"></button>
          </label>

          <label class="colour-row" data-timer-colour-row="face">
            <span class="lbl">Face colour</span>
            <input id="faceColorInput" type="text" value="#FFFFFF" aria-label="Face colour">
            <button id="faceColorPicker" class="color-preview-btn" type="button" aria-label="Edit face colour"></button>
          </label>

          <div class="colour-mode-row" style="margin-top:8px;">
            <button type="button" id="timerColourModeRGB" class="colour-mode-btn active">RGB</button>
            <button type="button" id="timerColourModeHSV" class="colour-mode-btn">HSV</button>
          </div>

          <div id="timerRgbEditor" class="colour-editor active">
            <div class="channel-row">
              <div class="channel-label">R</div>
              <input type="range" id="timerRgbRRange" min="0" max="255" step="1">
              <input type="number" id="timerRgbRInput" class="channel-number" min="0" max="255" step="1">
            </div>
            <div class="channel-row">
              <div class="channel-label">G</div>
              <input type="range" id="timerRgbGRange" min="0" max="255" step="1">
              <input type="number" id="timerRgbGInput" class="channel-number" min="0" max="255" step="1">
            </div>
            <div class="channel-row">
              <div class="channel-label">B</div>
              <input type="range" id="timerRgbBRange" min="0" max="255" step="1">
              <input type="number" id="timerRgbBInput" class="channel-number" min="0" max="255" step="1">
            </div>
          </div>

          <div id="timerHsvEditor" class="colour-editor">
            <div class="channel-row">
              <div class="channel-label">H</div>
              <input type="range" id="timerHsvHRange" min="0" max="360" step="1">
              <input type="number" id="timerHsvHInput" class="channel-number" min="0" max="360" step="1">
            </div>
            <div class="channel-row">
              <div class="channel-label">S</div>
              <input type="range" id="timerHsvSRange" min="0" max="100" step="1">
              <input type="number" id="timerHsvSInput" class="channel-number" min="0" max="100" step="1">
            </div>
            <div class="channel-row">
              <div class="channel-label">V</div>
              <input type="range" id="timerHsvVRange" min="0" max="100" step="1">
              <input type="number" id="timerHsvVInput" class="channel-number" min="0" max="100" step="1">
            </div>
          </div>

          <div class="row center" style="margin-top:8px;">
            <button id="resetColours" class="chip grow" type="button">Reset to Default</button>
          </div>
        </div>
      </section>

      <!-- STYLE PAGE -->
      <section id="page-style" class="modal-page">
        <button id="backFromStyle" class="modal-back-btn">&lt; Back</button>
        <h2 class="lbl" style="text-align:center;margin:0 0 6px;">Clock Customization</h2>

        <div class="stack">
          <div class="lbl" style="text-align:center;">Show on Clock:</div>
          <div class="row center inline-cb align-center">
            <label><input id="showAuto" type="checkbox"> Auto - hide what is zero</label>
          </div>
          <div class="row center inline-cb align-center">
            <label><input id="showHours" type="checkbox" checked> <b>HH</b></label>
            <span class="sep">:</span>
            <label><input id="showMinutes" type="checkbox" checked> <b>MM</b></label>
            <span class="sep">:</span>
            <label><input id="showSeconds" type="checkbox" checked> <b>SS</b></label>
            <span class="sep">.</span>
            <label><input id="showTicks" type="checkbox" checked> <b>TT</b></label>
          </div>

          <div class="row center align-center" style="margin-top:8px;">
            <label class="lbl" for="tpsSelect">Tick Rate:</label>
            <select id="tpsSelect">
              <option>10</option>
              <option>20</option>
              <option>30</option>
              <option value="40" selected>40 (Default)</option>
              <option>50</option>
              <option>60</option>
              <option>70</option>
              <option>80</option>
              <option>90</option>
              <option>100</option>
            </select>
            <span>TPS</span>
          </div>

          <div class="row center align-center">
            <label class="lbl" for="styleSelect">Prefix:</label>
            <select id="styleSelect">
              <option value="default">Default</option>
              <option value="time">Text</option>
              <option value="icon">Icon</option>
            </select>
          </div>

          <!-- Direction summary -->
          <div class="stack" style="margin-top:12px;">
            <div class="row center align-center">
              <span class="lbl">Count TO</span>
              <button id="directionBtn_style" class="chip">00:00:00.00</button>
              <button id="directionTarget_style" class="chip">00:00:00.00</button>
              <button id="directionTime_style" class="chip">TIME</button>
            </div>
            <div id="directionEnds_style" class="tiny muted" style="text-align:center;"></div>
          </div>

        </div>
      </section>

      <!-- HURRY PAGE -->
      <section id="page-hurry" class="modal-page">
        <button id="backFromHurry" class="modal-back-btn">&lt; Back</button>
        <h2 class="lbl" style="text-align:center;margin:0 0 6px;">Hurry Up Customization</h2>

        <div class="stack">
          <div class="row center align-center">
            <label class="lbl">Game style:</label>
            <select id="hurryUpMain"></select>
            <label class="lbl">Substyle:</label>
            <select id="hurryUpSub"></select>
          </div>
          <div id="hurryUpDesc" class="tiny faint" style="text-align:center;margin-top:-4px;"></div>

          <!-- Hurry-Up Volume -->
          <div class="row center align-center" style="margin-top:10px;">
            <label class="lbl" for="hurryVolume">Hurry Up Volume</label>
            <input
              id="hurryVolume"
              type="range"
              min="0"
              max="100"
              value="100"
              style="flex:1;max-width:260px;margin:0 8px;"
            />
            <span id="hurryVolumeLabel" class="tiny">100%</span>
          </div>

          <!-- Ten-second countdown warning -->
          <div class="row center align-center" style="margin-top:6px;">
            <label class="lbl" for="tenSecondWarningSound">Play</label>
            <select id="tenSecondWarningSound" class="grow">
              <option value="none">No Sound</option>
              <option value="sonic">Sonic Advance</option>
              <option value="soniccd">Sonic CD</option>
              <option value="mario">Super Mario 3D Land</option>
            </select>
            <label class="lbl" for="tenSecondWarningSound">sound when timer is at 10 seconds left</label>
          </div>
          <hr style="border:0;border-top:1px solid #333;margin:10px 0 0;">

          <div class="row center align-center" style="margin-top:10px;">
            <label class="lbl" for="flashMode">Flash on Last Minute</label>
            <select id="flashMode" class="grow">
              <option value="nothing">Nothing</option>
              <option value="prefix">Prefix</option>
              <option value="time">Time</option>
              <option value="all">All</option>
            </select>
          </div>

          <div class="row center align-center">
            <span class="lbl">Start flash at</span>
            <input id="flashValue" type="text" placeholder="Default: 00:01:00 (One Minute)" />
          </div>

          <div class="row center align-center">
            <label class="lbl" for="flashSpeed">Flash Style:</label>
            <select id="flashSpeed" class="grow">
              <option value="off">OFF</option>
              <option value="genesis">Sonic Genesis</option>
              <option value="triple">Sonic Triple Trouble 16 Bit</option>
              <option value="progressive">Progressive</option>
              <option value="superstars">Sonic Superstars</option>
              <option value="murder">Murder Mystery</option>
            </select>
          </div>

          <div id="emergencyFlashControls" class="emergency-flash-controls" hidden>
            <div class="row center align-center">
              <label class="lbl" for="emergencyFlashStyle">Emergency Style:</label>
              <select id="emergencyFlashStyle" class="grow">
                <option value="ship">Ship</option>
                <option value="amongus3d">Among Us 3D</option>
                <option value="victorian">Victorian</option>
                <option value="retro">Retro</option>
              </select>
            </div>
            <label class="row center align-center emergency-flash-toggle">
              <input id="emergencyFlashEnabled" type="checkbox" checked>
              <span class="lbl">Emergency Screen Flash</span>
            </label>
          </div>

        </div>
      </section>
    </div>
  </div>

    <script src="../../globals/themes/theme_runtime.js"></script>
  <script src="../../globals/global.js"></script>
  <script src="../../globals/modal.js"></script>
  <script src="./script.js"></script>
</body>
</html>
