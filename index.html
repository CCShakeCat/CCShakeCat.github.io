<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stopwatch">
        <p id="display">00:00:00.00</p>
        <button onclick="startStop()">Start/Stop</button>
        <button onclick="reset()">Reset</button>
    </div>

    <button id="openSettings">Settings</button>

    <div id="settingsModal" class="modal">
      <div class="modal-content">
        <span class="close" id="closeSettings">&times;</span>
        <h2>Settings</h2>
        <label for="fontSelect">Font:</label>
        <select id="fontSelect">
          <option value="default">Default (FancyCatPX)</option>
          <option value="system">System (OS Dependent)</option>
          <option value="custom">Import Custom Font</option>
        </select>
        <div id="customFontDiv" style="display:none; margin-top:10px;">
          <input type="file" id="customFontFile" accept=".ttf,.otf,.woff,.woff2"/>
          <span id="customFontName"></span>
        </div>
        <label for="msDropdown" style="margin-top:14px;">Milliseconds per second:</label>
        <select id="msDropdown">
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="30">30</option>
          <option value="40" selected>40 (Default)</option>
          <option value="50">50</option>
          <option value="60">60</option>
          <option value="70">70</option>
          <option value="80">80</option>
          <option value="90">90</option>
          <option value="100">100</option>
        </select>
        <button id="saveSettings" style="margin-top:16px;">Save</button>
      </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
