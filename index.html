<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="styles.css">
</head>

<button id="settingsButton">⚙️</button>
<iframe id="settingsFrame" src="settings.html" style="display:none; width: 0; height: 0;"></iframe>

<body>
    <div class="stopwatch">
        <p id="display">00:00:00.00</p>
        <button onclick="startStop()">Start/Stop</button>
        <button onclick="reset()">Reset</button>
    </div>

    <script src="script.js"></script>
<!-- Settings Button -->
<button id="settingsButton" style="position: absolute; top: 10px; left: 10px;">⚙️</button>

<!-- Settings Modal -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h2>Settings</h2>
        <label>
            <input type="checkbox" id="fontToggle"> Use Segoe UI for clock instead
        </label>
        <label>
            Use <select id="msDropdown">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="30">30</option>
                <option value="40" selected>40</option>
                <option value="50">50</option>
                <option value="60">60</option>
                <option value="70">70</option>
                <option value="80">80</option>
                <option value="90">90</option>
                <option value="100">100</option>
            </select> ms per second
        </label>
        <button onclick="saveSettings()">Save</button>
        <button onclick="closeSettings()">Close</button>
    </div>
</div>

<style>
    .modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #222;
        color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }
    .modal-content {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
</style>
</body>
</html>
