<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mimi Cat and Her Clock Problems :)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="center-content">
    <h1 class="main-title">MIMI CAT AND HER<br>CLOCK PROBLEMS :)</h1>
    <div class="clock-links">
      <div class="clock-link-row">
        <img src="homeicons/clock_three.png" alt="Real-Time Clock" class="clock-icon" />
        <span class="clock-link not-available" id="rtc-link">REAL-TIME CLOCK</span>
      </div>
      <div class="clock-link-row">
        <img src="homeicons/stopwatch_icon.png" alt="Stopwatch" class="clock-icon" />
        <a class="clock-link" id="stopwatch-link" href="./stopwatch/">STOPWATCH</a>
      </div>
      <div class="clock-link-row">
        <img src="homeicons/timer_clock.png" alt="Timer" class="clock-icon" />
        <span class="clock-link not-available" id="timer-link">TIMER</span>
      </div>
    </div>
  </main>
  <footer class="footnote">
    <p>* BG colour: #222222<br>
    * Text edge and dropshadow optional</p>
  </footer>
  <div id="popup-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="close" id="close-modal">&times;</span>
      <p id="modal-message"></p>
    </div>
  </div>
  <script>
    // Modal popup logic
    const modal = document.getElementById('popup-modal');
    const modalMessage = document.getElementById('modal-message');
    const closeModal = document.getElementById('close-modal');

    function showModal(message) {
      modalMessage.textContent = message;
      modal.style.display = 'block';
    }

    document.getElementById('rtc-link').onclick = function() {
      showModal("Real Time Clock is not currently available. Please try again later.");
    };
    document.getElementById('timer-link').onclick = function() {
      showModal("Timer is not currently available. Please try again later.");
    };
    closeModal.onclick = function() {
      modal.style.display = 'none';
    };
    window.onclick = function(event) {
      if (event.target === modal) {
        modal.style.display = 'none';
      }
    }
  </script>
</body>
</html>
