<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimi Cat's Stopwatch</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stopwatch">
        <p id="display">00:00.00</p>
        <button onclick="startStop()">Start/Stop</button>
        <button onclick="reset()">Reset</button>
    </div>

    <p style="font-family: 'FancyCatPX';">This is FancyCatPX</p>
    <p style="font-family: 'SegoeUIVariable';">This is Segoe UI Variable</p>


    <div class="keybinds">
        <label>Start/Stop Key: <input type="text" id="startStopKey" readonly></label>
        <label>Reset Key: <input type="text" id="resetKey" readonly></label>
        <button onclick="saveKeybinds()">Save Keybinds</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
