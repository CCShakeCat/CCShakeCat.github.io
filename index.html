<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button id="settingsBtn" title="Settings">⚙️</button>
    <div class="stopwatch">
        <p id="display">00:00:00.00</p>
        <button id="startStopBtn">Start/Stop</button>
        <button id="resetBtn">Reset</button>
    </div>

    <div id="settingsModal" class="modal">
      <div class="modal-content">
        <button id="closeSettings" title="Close">&times;</button>
        <h2>Settings</h2>
        <div class="setting-row">
            <span class="setting-label">Font:</span>
            <select id="fontSelect" class="setting-input">
              <option value="default">Default</option>
              <option value="system">System</option>
              <option value="custom">Custom</option>
            </select>
            <button id="importCustomFont">Import Custom Font...</button>
            <input type="file" id="customFontFile" style="display:none;" accept=".ttf,.otf,.woff,.woff2"/>
            <span id="customFontName" style="font-size:1.1em; color:#89f;"></span>
        </div>
        <div id="customFontNotice" style="display:none;font-size:0.9em;color:#f7d774;margin-left:410px;margin-top:4px;">
            If the font doesn't apply right away, try refreshing the page
        </div>
      </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
