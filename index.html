<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stopwatch">
        <p id="display">00:00:00.00</p>
        <button onclick="startStop()">Start/Stop</button>
        <button onclick="reset()">Reset</button>
    </div>

    <script src="script.js"></script>
<!-- Settings Modal -->
<div id="settingsModal" class="modal" style="display:none;">
  <div class="modal-content">
    <span class="close" id="closeSettings">&times;</span>
    <h2>Settings</h2>
    <label for="fontSelect">Font:</label>
    <select id="fontSelect">
      <option value="default">Default</option>
      <option value="system">System</option>
      <option value="custom">Import Custom Font</option>
    </select>
    <div id="customFontDiv" style="display:none; margin-top:10px;">
      <input type="file" id="customFontFile" accept=".ttf,.otf,.woff,.woff2"/>
      <span id="customFontName"></span>
    </div>
    <button id="saveSettings">Save</button>
  </div>
</div>
<button id="openSettings">Settings</button>
</body>
</html>
